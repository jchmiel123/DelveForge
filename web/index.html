<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DelveForge</title>
<style>
body{font-family:system-ui,sans-serif;max-width:720px;margin:1rem auto;padding:0 10px;background:var(--df-bg,#14141b);color:var(--df-text,#e8e4d8);}
#df-root{background:var(--df-bg);color:var(--df-text);border-radius:14px;}
#df-root button{font:inherit;font-size:13px;padding:5px 10px;border-radius:8px;border:1px solid var(--df-border);background:var(--df-panel);color:var(--df-text);cursor:pointer;}
#df-root button:hover{background:var(--df-panel2);border-color:var(--df-accent);}
#df-root select{font:inherit;font-size:13px;padding:4px 6px;border-radius:8px;border:1px solid var(--df-border);background:var(--df-panel);color:var(--df-text);}
#df-root option{background:var(--df-panel);color:var(--df-text);}
#df-root input[type=range]{accent-color:var(--df-accent);}
.card{border:1px solid var(--df-border);border-radius:12px;padding:12px;cursor:pointer;text-align:center;flex:1;background:var(--df-panel);}
.card:hover{border-color:var(--df-accent);}
</style>
</head>
<body>
<div id="df-root"></div>
<script>
const DF_ROOT=document.getElementById("df-root");
const THEMES={
 dark:{bg:"#14141b",panel:"#1d1d27",panel2:"#262633",text:"#e8e4d8",muted:"#9a96a8",border:"#3a3a4a",accent:"#EF9F27",danger:"#E24B4A"},
 light:{bg:"#f2efe6",panel:"#ffffff",panel2:"#e9e5d8",text:"#2c2c34",muted:"#6a6a76",border:"#c9c5b8",accent:"#9a6a10",danger:"#A32D2D"}};
let themeName="dark";
try{themeName=localStorage.getItem("df_theme")||"dark";}catch(e){}
function applyTheme(){
  const T=THEMES[themeName]||THEMES.dark;
  for(const k of Object.keys(T))DF_ROOT.style.setProperty("--df-"+k,T[k]);
  document.body&&document.body.style.setProperty("--df-bg",T.bg);
  const tb=document.getElementById("btn-theme");
  if(tb)tb.textContent=themeName==="dark"?"Theme: dark":"Theme: light";
}
DF_ROOT.innerHTML=`
<div id="hud" style="display:none;align-items:center;gap:12px;flex-wrap:wrap;margin:0 0 6px;font-size:14px;">
  <span id="h-class" style="font-weight:500;"></span>
  <span id="h-hp"></span>
  <span id="h-stats" style="font-size:13px;color:var(--df-muted);"></span>
  <span id="h-gold" style="color:var(--df-accent);"></span>
  <span id="h-depth"></span>
  <span style="margin-left:auto;font-size:12px;color:var(--df-muted);" id="h-seed"></span>
</div>
<div id="select" style="display:flex;gap:12px;align-items:stretch;"></div>
<div id="stage" style="position:relative;display:none;">
  <canvas id="cv" tabindex="0" style="width:100%;display:block;border:1px solid var(--df-border);border-radius:12px;outline:none;"></canvas>
  <div id="brainbox" style="position:absolute;top:8px;right:8px;display:none;background:rgba(14,14,22,0.9);border:1px solid var(--df-border);border-radius:8px;padding:4px;">
    <canvas id="netcv" style="display:block;width:290px;height:180px;"></canvas>
  </div>
  <div id="dead" style="position:absolute;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;gap:10px;background:rgba(10,10,14,0.75);border-radius:12px;color:#eee;">
    <div style="font-size:22px;">You have fallen</div>
    <div id="dead-sub" style="font-size:14px;opacity:0.8;"></div>
    <button id="btn-again" style="color:#eee;">Rise again</button>
  </div>
</div>
<div id="log" style="display:none;font-size:12.5px;color:var(--df-muted);min-height:3.2em;margin:6px 2px;line-height:1.35;"></div>
<div id="invrow" style="display:none;align-items:center;gap:6px;flex-wrap:wrap;margin:2px 0 6px;font-size:12.5px;">
  <span id="inv-equip" style="color:var(--df-muted);"></span>
  <span id="inv-items" style="display:inline-flex;gap:6px;flex-wrap:wrap;"></span>
</div>
<div id="pad" style="display:none;align-items:center;gap:6px;flex-wrap:wrap;margin:2px 0 0;">
  <button data-mv="0,-1" aria-label="Move up">&#9650;</button>
  <button data-mv="0,1" aria-label="Move down">&#9660;</button>
  <button data-mv="-1,0" aria-label="Move left">&#9664;</button>
  <button data-mv="1,0" aria-label="Move right">&#9654;</button>
  <button id="btn-ability">Ability (F)</button>
  <button id="btn-potion">Potion (Q)</button>
  <button id="btn-wait">Wait</button>
  <button id="btn-map">Map (M)</button>
  <span style="font-size:11.5px;color:var(--df-muted);margin-left:auto;">arrows/WASD - click the dungeon first</span>
</div>
<div id="airow" style="display:none;align-items:center;gap:8px;flex-wrap:wrap;margin:10px 0 0;padding:8px 10px;border:1px solid var(--df-border);border-radius:10px;background:var(--df-panel);">
  <button id="btn-ai" style="font-weight:500;">AI: off</button>
  <span id="ai-info" style="font-size:12px;color:var(--df-muted);"></span>
  <input type="range" id="ai-speed" min="1" max="40" value="12" step="1" style="width:100px;" aria-label="AI steps per second"/>
  <span id="ai-speed-out" style="font-size:12px;color:var(--df-muted);">12/s</span>
  <span style="margin-left:auto;"></span>
  <button id="btn-save-brain">Save brain</button>
  <select id="brain-list" aria-label="Saved brains"><option value="">saved brains...</option></select>
  <button id="btn-brain-view">Show brain</button>
  <button id="btn-load-brain">Load</button>
  <button id="btn-del-brain">Delete</button>
  <button id="btn-fresh-brain">Fresh</button>
</div>
<div id="monrow" style="display:none;align-items:center;gap:8px;flex-wrap:wrap;margin:6px 0 0;padding:8px 10px;border:1px solid var(--df-border);border-radius:10px;background:var(--df-panel);">
  <button id="btn-mon-ai" style="font-weight:500;">Monsters: learning</button>
  <span id="mon-info" style="font-size:12px;color:var(--df-muted);"></span>
  <span style="margin-left:auto;"></span>
  <button id="btn-mon-fresh">Forget everything</button>
  <button id="btn-theme">Theme: dark</button>
</div>`;
const TW=40,TH=26,WALL=0,FLOOR=1,STAIRS=3,CHEST=5,CHESTO=6;
const LEVELS=["The abandoned manor","The cellars","The catacombs","The deep halls","The old mine","The ember depths"];
const CLASSES=[
 {name:"Warrior",color:"#D85A30",hp:16,atk:3,def:1,light:3.2,cone:5,ability:"Smite",blurb:"Heavy steel. Smite hits every adjacent foe."},
 {name:"Ranger",color:"#639922",hp:11,atk:2,def:0,light:3.0,cone:7,ability:"Shoot",blurb:"Keen eyes. Arrows strike from the dark."},
 {name:"Mage",color:"#7F77DD",hp:9,atk:1,def:0,light:4.6,cone:5,ability:"Bolt",blurb:"Bright aura. Bolts of fire, fed by mana."}];
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
let baseSeed=Math.floor(Math.random()*1e9),rng=mulberry32(baseSeed);
function R(){return rng();}
function ri(n){return Math.floor(R()*n);}
let cls=null,depth=0,grid,rooms,torches,monsters,explored,litSet,px,py,fx=1,fy=0,hp,gold,vx,vy,showMap=false,state="select",visCache=new Set();
let arrows=0,mana=0,cd=0;
let level=1,xp=0,weapon={name:"Fists",atk:0},armor={name:"Cloth",def:0},inv={potion:0,scroll:0},lightTimer=0;
const WEAPONS=[["Dagger",1],["Sword",2],["War axe",3],["Runeblade",4]];
const ARMORS=[["Leather",1],["Chain",2],["Plate",3]];
let floaters=[],msgs=[],evt=null;
function idx(x,y){return y*TW+x;}
function inB(x,y){return x>=0&&x<TW&&y>=0&&y<TH;}
function pushMsg(m){msgs.push(m);if(msgs.length>3)msgs.shift();
  const el=document.getElementById("log");if(el)el.innerHTML=msgs.map((s,i)=>'<div style="opacity:'+(0.5+0.25*i)+'">'+s+"</div>").join("");}
function floatTxt(x,y,txt,color){floaters.push({x:x,y:y,txt:txt,c:color,age:0});}
function genLevel(){
  rng=mulberry32(baseSeed+depth*7919);
  grid=new Uint8Array(TW*TH);rooms=[];torches=[];monsters=[];explored=new Uint8Array(TW*TH);
  for(let t=0;t<80&&rooms.length<9;t++){
    const w=4+ri(7),h=3+ri(4),x=1+ri(TW-w-2),y=1+ri(TH-h-2);
    let ok=true;
    for(const r of rooms)if(x<r.x+r.w+1&&r.x<x+w+1&&y<r.y+r.h+1&&r.y<y+h+1){ok=false;break;}
    if(!ok)continue;
    rooms.push({x:x,y:y,w:w,h:h});
    for(let j=y;j<y+h;j++)for(let i=x;i<x+w;i++)grid[idx(i,j)]=FLOOR;
  }
  for(let r=1;r<rooms.length;r++){
    const a=rooms[r-1],b=rooms[r];
    let x0=a.x+ri(a.w),y0=a.y+ri(a.h),x1=b.x+ri(b.w),y1=b.y+ri(b.h);
    while(x0!==x1){grid[idx(x0,y0)]=grid[idx(x0,y0)]||FLOOR;x0+=x0<x1?1:-1;}
    while(y0!==y1){grid[idx(x0,y0)]=grid[idx(x0,y0)]||FLOOR;y0+=y0<y1?1:-1;}
    grid[idx(x1,y1)]=grid[idx(x1,y1)]||FLOOR;
  }
  for(const r of rooms){
    const n=1+ri(2);
    for(let k=0;k<n;k++)torches.push([r.x+ri(r.w),r.y===0?r.y:r.y+ri(r.h)]);
  }
  for(let c=0;c<3+ri(2);c++){const r=rooms[1+ri(rooms.length-1)];grid[idx(r.x+ri(r.w),r.y+ri(r.h))]=CHEST;}
  const last=rooms[rooms.length-1];
  grid[idx(last.x+(last.w>>1),last.y+(last.h>>1))]=STAIRS;
  px=rooms[0].x+(rooms[0].w>>1);py=rooms[0].y+(rooms[0].h>>1);vx=px;vy=py;
  grid[idx(px,py)]=FLOOR;
  const nMon=3+depth;
  for(let m=0;m<nMon;m++){
    const r=rooms[1+ri(rooms.length-1)];
    const mx=r.x+ri(r.w),my=r.y+ri(r.h);
    if(grid[idx(mx,my)]!==FLOOR)continue;
    const skel=depth>=2&&R()<0.5;
    monsters.push({x:mx,y:my,vx:mx,vy:my,hp:skel?5:2,maxhp:skel?5:2,atk:skel?2:1,skel:skel,flash:0});
  }
  litSet=new Set();
  for(const t of torches)for(let y=0;y<TH;y++)for(let x=0;x<TW;x++){
    if(Math.hypot(x-t[0],y-t[1])<=3&&los(t[0],t[1],x,y))litSet.add(idx(x,y));
  }
  computeVis();
}
function los(x0,y0,x1,y1){
  let dx=Math.abs(x1-x0),dy=Math.abs(y1-y0),sx=x0<x1?1:-1,sy=y0<y1?1:-1,err=dx-dy,x=x0,y=y0;
  while(!(x===x1&&y===y1)){
    if(!(x===x0&&y===y0)&&grid[idx(x,y)]===WALL)return false;
    const e2=2*err;
    if(e2>-dy){err-=dy;x+=sx;}
    if(e2<dx){err+=dx;y+=sy;}
  }
  return true;
}
function computeVis(){
  visCache=new Set();
  let fresh=0;
  for(let y=0;y<TH;y++)for(let x=0;x<TW;x++){
    const dx=x-px,dy=y-py,d=Math.hypot(dx,dy);
    const f=dx*fx+dy*fy,l=dx*(-fy)+dy*fx;
    const inCone=f>=0&&f<=cls.cone&&Math.abs(l)<=1+f*0.7;
    const nearRing=Math.abs(dx)<=1&&Math.abs(dy)<=1;
    if(!inCone&&!nearRing)continue;
    if(!los(px,py,x,y))continue;
    const lit=d<=lightR()||litSet.has(idx(x,y));
    if(lit){visCache.add(idx(x,y));if(!explored[idx(x,y)])fresh++;explored[idx(x,y)]=1;}
  }
  visCache.add(idx(px,py));explored[idx(px,py)]=1;
  return fresh;
}
function monsterAt(x,y){for(const m of monsters)if(m.x===x&&m.y===y)return m;return null;}
function walkable(x,y){const t=grid[idx(x,y)];return inB(x,y)&&t!==WALL&&t!==CHEST;}
function atk(){return cls.atk+weapon.atk+Math.floor((level-1)/2);}
function defTotal(){return cls.def+armor.def;}
function lightR(){return cls.light+(lightTimer>0?2:0);}
function gainXp(n){
  xp+=n;
  while(xp>=level*10){
    xp-=level*10;level++;
    hp=Math.min(maxHp(),hp+4);
    pushMsg("Level up! You are now level "+level+".");
    floatTxt(px,py,"LVL "+level,"#EF9F27");
  }
}
function hitMonster(m,dmg,label){
  m.hp-=dmg;m.flash=1;
  floatTxt(m.x,m.y,"-"+dmg,"#F09595");
  if(m.hp<=0){
    monDeathLesson(m);
    monsters.splice(monsters.indexOf(m),1);
    const g=m.skel?3:1;gold+=g;
    gainXp(m.skel?5:2);
    if(R()<(m.skel?0.2:0.12)){inv.potion++;pushMsg("The "+(m.skel?"skeleton":"rat")+" dropped a potion.");}
    if(evt)evt.kill++;
    pushMsg(label+" slays the "+(m.skel?"skeleton":"rat")+" (+"+g+" gold, +"+(m.skel?5:2)+" xp).");
  }else pushMsg(label+" hits the "+(m.skel?"skeleton":"rat")+" for "+dmg+".");
}
function lootChest(x,y){
  grid[idx(x,y)]=CHESTO;
  const roll=R();
  if(roll<0.3){const g=5+ri(6)+depth*3;gold+=g;if(evt)evt.gold+=g;floatTxt(x,y,"+"+g,"#EF9F27");pushMsg("A chest of coins: +"+g+" gold.");}
  else if(roll<0.5){inv.potion++;floatTxt(x,y,"potion","#F09595");pushMsg("Found a healing potion.");}
  else if(roll<0.62){arrows+=6;floatTxt(x,y,"+6 arrows","#9FE1CB");pushMsg("A bundle of arrows (+6).");}
  else if(roll<0.74){inv.scroll++;floatTxt(x,y,"scroll","#AFA9EC");pushMsg("A scroll of torchlight.");}
  else if(roll<0.88){
    let tier=Math.min(4,1+ri(2)+(depth>=2?ri(2):0));
    const w=WEAPONS[tier-1];
    if(w[1]>weapon.atk){weapon={name:w[0],atk:w[1]};floatTxt(x,y,w[0]+"!","#FAC775");pushMsg("You take up the "+w[0].toLowerCase()+" (ATK now "+atk()+").");}
    else{gold+=3;floatTxt(x,y,"+3","#EF9F27");pushMsg("A "+w[0].toLowerCase()+" - no better than yours. Sold for 3 gold.");}
  }
  else{
    let tier=Math.min(3,1+(depth>=2?ri(2):0)+(R()<0.3?1:0));
    const a=ARMORS[tier-1];
    if(a[1]>armor.def){armor={name:a[0],def:a[1]};floatTxt(x,y,a[0]+"!","#B5D4F4");pushMsg("You don the "+a[0].toLowerCase()+" armor (DEF now "+defTotal()+").");}
    else{gold+=3;floatTxt(x,y,"+3","#EF9F27");pushMsg("Spare "+a[0].toLowerCase()+" armor, no better than yours. Sold for 3 gold.");}
  }
  if(evt)evt.chest++;
}
function playerAct(dx,dy){
  if(state!=="play")return;
  fx=dx;fy=dy;
  const nx=px+dx,ny=py+dy;
  if(inB(nx,ny)){
    const m=monsterAt(nx,ny);
    const t=grid[idx(nx,ny)];
    if(m)hitMonster(m,atk()+(R()<0.3?1:0),cls.name);
    else if(t===CHEST)lootChest(nx,ny);
    else if(walkable(nx,ny)){
      px=nx;py=ny;
      if(t===STAIRS){
        depth++;hp=Math.min(maxHp(),hp+3);
        if(evt)evt.descend=true;
        pushMsg("You descend to "+LEVELS[Math.min(depth,LEVELS.length-1)].toLowerCase()+".");
        genLevel();updateHud();return;
      }
    }
  }
  endTurn();
}
function maxHp(){return cls.hp+(level-1)*2;}
function ability(){
  if(state!=="play")return;
  if(cls.name==="Warrior"){
    if(cd>0){pushMsg("Smite is recovering ("+cd+").");return;}
    let hit=0;
    for(const m of monsters.slice())if(Math.abs(m.x-px)<=1&&Math.abs(m.y-py)<=1){hitMonster(m,atk()+1,"Smite");hit++;}
    if(!hit){pushMsg("Smite cleaves empty air.");}
    cd=6;
  }else{
    const tgt=nearestVisibleMonster(cls.name==="Ranger"?7:5);
    if(!tgt){pushMsg("No target in sight.");return;}
    if(cls.name==="Ranger"){
      if(arrows<=0){pushMsg("Out of arrows.");return;}
      arrows--;shots.push({x0:px,y0:py,x1:tgt.x,y1:tgt.y,age:0,c:"#9FE1CB"});
      hitMonster(tgt,atk()+2,"The arrow");
    }else{
      if(mana<3){pushMsg("Not enough mana.");return;}
      mana-=3;shots.push({x0:px,y0:py,x1:tgt.x,y1:tgt.y,age:0,c:"#AFA9EC"});
      hitMonster(tgt,4,"The bolt");
    }
  }
  endTurn();
}
let shots=[];
function nearestVisibleMonster(range){
  let best=null,bd=range+0.001;
  for(const m of monsters){
    const d=Math.hypot(m.x-px,m.y-py);
    if(d<=bd&&visCache.has(idx(m.x,m.y))&&los(px,py,m.x,m.y)){bd=d;best=m;}
  }
  return best;
}
function readScroll(){
  if(state!=="play")return;
  if(inv.scroll<=0){pushMsg("No scrolls left.");return;}
  inv.scroll--;lightTimer=40;
  floatTxt(px,py,"light!","#AFA9EC");pushMsg("The scroll blazes - your light widens for 40 turns.");
  endTurn();
}
function drinkPotion(){
  if(state!=="play")return;
  if(inv.potion<=0){pushMsg("No potions left.");return;}
  inv.potion--;hp=Math.min(maxHp(),hp+6);
  floatTxt(px,py,"+6","#9FE1CB");pushMsg("You drink a potion (+6 HP).");
  endTurn();
}
function endTurn(){
  if(cd>0)cd--;
  if(lightTimer>0)lightTimer--;
  if(cls.name==="Mage")mana=Math.min(12,mana+1);
  monstersTurn();computeVis();updateHud();
}
const MSENS=11,MACT=5;
const species={rat:null,skeleton:null};
const monAI={on:true};
function spec(m){return m.skel?"skeleton":"rat";}
function specGet(name){
  if(!species[name]){
    let stored=null;
    try{stored=(JSON.parse(localStorage.getItem("df_species")||"{}"))[name]||null;}catch(e){}
    species[name]=stored||{brain:nfRandom([MSENS,16,MACT]),eps:1.0,steps:0,deaths:0,kills:0};
    species[name].target=nfCopy(species[name].brain);
    species[name].buffer=[];
  }
  return species[name];
}
function specSave(){
  try{
    const out={};
    for(const k of Object.keys(species)){
      if(!species[k])continue;
      out[k]={brain:species[k].brain,eps:species[k].eps,steps:species[k].steps,deaths:species[k].deaths,kills:species[k].kills};
    }
    localStorage.setItem("df_species",JSON.stringify(out));
  }catch(e){}
}
function monSensor(m){
  const dirs=[[0,-1],[0,1],[-1,0],[1,0]],v=[];
  for(const d of dirs){
    let wall=0;
    for(let s=1;s<=6;s++){const x=m.x+d[0]*s,y=m.y+d[1]*s;if(!inB(x,y)||grid[idx(x,y)]===WALL){wall=1/s;break;}}
    v.push(wall);
  }
  const dx=px-m.x,dy=py-m.y,dist=Math.abs(dx)+Math.abs(dy);
  const sees=dist<=9&&los(m.x,m.y,px,py)?1:0;
  v.push(Math.sign(dx),Math.sign(dy),1/(1+dist),sees);
  let allies=0;
  for(const o of monsters)if(o!==m&&Math.abs(o.x-m.x)<=1&&Math.abs(o.y-m.y)<=1)allies++;
  v.push(m.hp/m.maxhp,Math.min(1,allies/3),1);
  return v;
}
function monDeathLesson(m){
  const sp=spec(m),S=species[sp];
  if(!S||!m.lastS)return;
  S.buffer.push([m.lastS,m.lastA,-6,null,true]);
  S.deaths++;S.eps=Math.max(0.08,S.eps*0.97);
  if(S.deaths%10===0)pushMsg("The "+sp+"s are learning from their dead...");
}
function attackPlayer(m){
  const dmg=Math.max(1,m.atk-defTotal()+(R()<0.3?1:0));
  hp-=dmg;if(evt)evt.dmg+=dmg;
  floatTxt(px,py,"-"+dmg,"#E24B4A");
  pushMsg("The "+(m.skel?"skeleton":"rat")+" hits you for "+dmg+".");
  return dmg;
}
function monScriptAct(m){
  const d=Math.max(Math.abs(m.x-px),Math.abs(m.y-py));
  if(d<=1){attackPlayer(m);return;}
  let sx=0,sy=0;
  if(Math.hypot(m.x-px,m.y-py)<8&&los(m.x,m.y,px,py)){
    sx=Math.sign(px-m.x);sy=Math.sign(py-m.y);
    if(Math.abs(m.x-px)<Math.abs(m.y-py))sx=0;else sy=0;
  }else if(R()<0.4){const dirs=[[0,-1],[0,1],[-1,0],[1,0]];const dd=dirs[ri(4)];sx=dd[0];sy=dd[1];}
  const nx=m.x+sx,ny=m.y+sy;
  if((sx||sy)&&walkable(nx,ny)&&!monsterAt(nx,ny)&&!(nx===px&&ny===py)){m.x=nx;m.y=ny;}
}
function monBrainAct(m){
  const S=specGet(spec(m));
  const s0=monSensor(m);
  const a=Math.random()<S.eps?Math.floor(Math.random()*MACT):nfArgmax(nfForward(S.brain,s0));
  const d0=Math.abs(px-m.x)+Math.abs(py-m.y);
  let r=-0.02,killedPlayer=false;
  if(a<4){
    const dd=[[0,-1],[0,1],[-1,0],[1,0]][a];
    const nx=m.x+dd[0],ny=m.y+dd[1];
    if(nx===px&&ny===py){
      const dealt=attackPlayer(m);
      r+=0.8*dealt;
      if(hp<=0){r+=6;killedPlayer=true;S.kills++;}
    }else if(walkable(nx,ny)&&!monsterAt(nx,ny)){m.x=nx;m.y=ny;}
  }
  r+=0.15*(d0-(Math.abs(px-m.x)+Math.abs(py-m.y)));
  m.lastS=s0;m.lastA=a;
  S.buffer.push([s0,a,r,monSensor(m),killedPlayer]);
  if(S.buffer.length>3000)S.buffer.shift();
  S.steps++;S.eps=Math.max(0.08,S.eps*0.9999);
}
function monTrainAll(){
  for(const k of Object.keys(species)){
    const S=species[k];
    if(!S||S.buffer.length<16)continue;
    for(let n=0;n<6;n++){
      const e=S.buffer[Math.floor(Math.random()*S.buffer.length)];
      const tq=nfForward(S.brain,e[0]).slice();
      if(e[4])tq[e[1]]=e[2];
      else{
        const bi=nfArgmax(nfForward(S.brain,e[3]));
        tq[e[1]]=e[2]+0.92*nfForward(S.target,e[3])[bi];
      }
      nfTrain(S.brain,e[0],tq,0.006);
    }
    if(S.steps%400<6)S.target=nfCopy(S.brain);
    if(S.steps%500<6)specSave();
  }
  monInfo();
}
function monInfo(){
  const el=document.getElementById("mon-info");

  if(!monAI.on){el.textContent="scripted instincts";return;}
  const parts=[];

    const S=species[k];
    if(S&&S.steps>0)parts.push(k+"s: "+(S.steps>999?(S.steps/1000).toFixed(1)+"k":S.steps)+" lessons, "+S.deaths+" deaths, "+S.kills+" kills");
  }
  el.textContent=parts.join(" - ")||"waiting for the first encounter";
}

const NFCLIP=5;
function nfClip(g){return g>NFCLIP?NFCLIP:(g<-NFCLIP?-NFCLIP:g);}
function nfGauss(){let u=0,v=0;while(!u)u=Math.random();while(!v)v=Math.random();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);}
function nfRandom(sizes){
  const L=[];
  for(let i=0;i<sizes.length-1;i++){
    const s=Math.sqrt(2/sizes[i]);
    L.push({w:Array.from({length:sizes[i+1]},()=>Array.from({length:sizes[i]},()=>nfGauss()*s)),b:new Array(sizes[i+1]).fill(0),a:i===sizes.length-2?"linear":"tanh"});
  }
  return L;
}
function nfCopy(b){return JSON.parse(JSON.stringify(b));}
function nfForwardAll(b,x){
  const acts=[x];let cur=x;
  for(const L of b){
    const out=[];
    for(let i=0;i<L.w.length;i++){let t=L.b[i];const row=L.w[i];for(let j=0;j<row.length;j++)t+=row[j]*cur[j];out.push(L.a==="tanh"?Math.tanh(t):t);}
    acts.push(out);cur=out;
  }
  return acts;
}
function nfForward(b,x){
  let cur=x;
  for(const L of b){
    const out=[];
    for(let i=0;i<L.w.length;i++){let t=L.b[i];const row=L.w[i];for(let j=0;j<row.length;j++)t+=row[j]*cur[j];out.push(L.a==="tanh"?Math.tanh(t):t);}
    cur=out;
  }
  return cur;
}
function nfArgmax(a){let bi=0;for(let i=1;i<a.length;i++)if(a[i]>a[bi])bi=i;return bi;}
function nfTrain(b,x,t,lr){
  const A=nfForwardAll(b,x),L=b.length;
  let g=A[L].map((o,i)=>nfClip(2*(o-t[i])/A[L].length));
  for(let li=L-1;li>=0;li--){
    const layer=b[li],ain=A[li];
    const gin=new Array(ain.length).fill(0);
    for(let j=0;j<ain.length;j++){let s=0;for(let i=0;i<layer.w.length;i++)s+=layer.w[i][j]*g[i];gin[j]=s;}
    for(let i=0;i<layer.w.length;i++){const gi=g[i],row=layer.w[i];for(let j=0;j<ain.length;j++)row[j]-=lr*gi*ain[j];layer.b[i]-=lr*gi;}
    if(li>0)g=gin.map((v,j)=>nfClip(v*(b[li-1].a==="tanh"?1-A[li][j]*A[li][j]:1)));
  }
}
const SENSN=26,ACTN=7;
const ALBL=["up","down","left","right","ability","potion","scroll"];
let lastActs=null,lastChosen=0,lastExplore=false,brainView=false;
const ai={mode:"off",brain:null,target:null,eps:1.0,buffer:[],steps:0,episodes:0,bestDepth:0,sps:12,name:"fresh rookie"};
function sensor(){
  const dirs=[[0,-1],[0,1],[-1,0],[1,0]],v=[];
  for(const d of dirs){
    let wall=0,mon=0,chest=0;
    for(let s=1;s<=10;s++){
      const x=px+d[0]*s,y=py+d[1]*s;
      if(!inB(x,y)||grid[idx(x,y)]===WALL){wall=1/s;break;}
      const id=idx(x,y);
      if(visCache.has(id)){
        if(!mon&&monsterAt(x,y))mon=1/s;
        if(!chest&&grid[id]===CHEST)chest=1/s;
      }
    }
    v.push(wall,mon,chest);
  }
  let sx=0,sy=0,sd=0,seen=0;
  const si=grid.indexOf(STAIRS);
  if(si>=0&&explored[si]){
    const tx=si%TW,ty=Math.floor(si/TW);
    seen=1;sx=Math.sign(tx-px);sy=Math.sign(ty-py);
    sd=1/(1+Math.abs(tx-px)+Math.abs(ty-py));
  }
  v.push(sx,sy,sd,seen,hp/maxHp(),Math.min(1,depth/6),1);
  let adj=0;
  for(const m of monsters)if(Math.abs(m.x-px)<=1&&Math.abs(m.y-py)<=1)adj++;
  const res=cls.name==="Ranger"?Math.min(1,arrows/12):cls.name==="Mage"?mana/12:(cd===0?1:0);
  v.push(Math.min(1,inv.potion/3),inv.scroll>0?1:0,res,lightTimer>0?1:0,weapon.atk/4,armor.def/3,Math.min(1,adj/3));
  return v;
}
function brainIn(b){return b[0].w[0].length;}
function brainOut(b){return b[b.length-1].b.length;}
function aiEnsureBrain(){
  if(!ai.brain){ai.brain=nfRandom([SENSN,32,16,ACTN]);ai.target=nfCopy(ai.brain);ai.eps=1.0;ai.name="fresh rookie (Mk II)";}
}
function aiRespawn(){
  ai.episodes++;
  if(depth>ai.bestDepth)ai.bestDepth=depth;
  pushMsg("The "+cls.name.toLowerCase()+" falls at depth "+(depth+1)+". Life "+(ai.episodes+1)+" begins.");
  level=1;xp=0;weapon={name:"Fists",atk:0};armor={name:"Cloth",def:0};
  inv={potion:0,scroll:0};lightTimer=0;
  hp=maxHp();gold=0;depth=0;arrows=cls.name==="Ranger"?12:0;mana=cls.name==="Mage"?12:0;cd=0;
  genLevel();updateHud();
}
function turnUpkeep(){
  if(cd>0)cd--;
  if(lightTimer>0)lightTimer--;
  if(cls.name==="Mage")mana=Math.min(12,mana+1);
  monstersTurn();
  const fresh=computeVis();
  updateHud();
  return fresh;
}
function aiUse(a){
  let wasted=false;
  if(a===4){
    if(cls.name==="Warrior"){
      let hit=0;
      if(cd===0){for(const m of monsters.slice())if(Math.abs(m.x-px)<=1&&Math.abs(m.y-py)<=1){hitMonster(m,atk()+1,"Smite");hit++;}}
      if(hit>0)cd=6;else wasted=true;
    }else{
      const tgt=nearestVisibleMonster(cls.name==="Ranger"?7:5);
      if(cls.name==="Ranger"&&tgt&&arrows>0){arrows--;shots.push({x0:px,y0:py,x1:tgt.x,y1:tgt.y,age:0,c:"#9FE1CB"});hitMonster(tgt,atk()+2,"The arrow");}
      else if(cls.name==="Mage"&&tgt&&mana>=3){mana-=3;shots.push({x0:px,y0:py,x1:tgt.x,y1:tgt.y,age:0,c:"#AFA9EC"});hitMonster(tgt,4,"The bolt");}
      else wasted=true;
    }
  }else if(a===5){
    if(inv.potion>0&&hp<maxHp()){inv.potion--;hp=Math.min(maxHp(),hp+6);floatTxt(px,py,"+6","#9FE1CB");}
    else wasted=true;
  }else{
    if(inv.scroll>0&&lightTimer<=0){inv.scroll--;lightTimer=40;floatTxt(px,py,"light!","#AFA9EC");}
    else wasted=true;
  }
  return wasted;
}
function aiTick(){
  if(state!=="play")return;
  aiEnsureBrain();
  const nIn=brainIn(ai.brain),nOut=brainOut(ai.brain);
  const sFull=sensor(),s0=sFull.slice(0,nIn);
  const explore=ai.mode==="training"&&Math.random()<ai.eps;
  const learning=ai.mode==="training"||ai.mode==="playing";
  const allActs=nfForwardAll(ai.brain,s0);
  const q=allActs[allActs.length-1];
  const a=explore?Math.floor(Math.random()*nOut):nfArgmax(q);
  lastActs=allActs;lastChosen=a;lastExplore=explore;
  evt={gold:0,kill:0,chest:0,dmg:0,descend:false,died:false};
  let fresh=0,wasted=false;
  if(a<4){
    const dirs=[[0,-1],[0,1],[-1,0],[1,0]];
    fresh=aiMove(dirs[a][0],dirs[a][1]);
  }else{
    wasted=aiUse(a);
    fresh=turnUpkeep();
  }
  let r=-0.02+fresh*0.05+evt.kill*2+evt.chest*1+evt.gold*0.05-evt.dmg*0.5;
  if(wasted)r-=0.05;
  if(evt.descend)r+=8;
  if(evt.died)r-=10;
  const done=evt.died;
  if(learning){
    const s1=done?null:sensor().slice(0,nIn);
    ai.buffer.push([s0,a,r,s1,done]);
    if(ai.buffer.length>4000)ai.buffer.shift();
    if(ai.buffer.length>=12){
      for(let n=0;n<12;n++){
        const e=ai.buffer[Math.floor(Math.random()*ai.buffer.length)];
        const tq=nfForward(ai.brain,e[0]).slice();
        if(e[4])tq[e[1]]=e[2];
        else{
          const bi=nfArgmax(nfForward(ai.brain,e[3]));
          tq[e[1]]=e[2]+0.95*nfForward(ai.target,e[3])[bi];
        }
        nfTrain(ai.brain,e[0],tq,0.008);
      }
    }
    ai.steps++;
    if(ai.steps%300===0)ai.target=nfCopy(ai.brain);
    if(ai.mode==="training")ai.eps=Math.max(0.05,ai.eps*0.99993);
  }
  if(done){
    if(ai.mode==="training")ai.eps=Math.max(0.05,ai.eps*0.98);
    aiRespawn();
  }
  evt=null;
  aiInfo();
}
function aiMove(dx,dy){
  fx=dx;fy=dy;
  const nx=px+dx,ny=py+dy;
  if(inB(nx,ny)){
    const m=monsterAt(nx,ny);
    const t=grid[idx(nx,ny)];
    if(m)hitMonster(m,atk()+(R()<0.3?1:0),cls.name);
    else if(t===CHEST)lootChest(nx,ny);
    else if(walkable(nx,ny)){
      px=nx;py=ny;
      if(t===STAIRS){
        depth++;hp=Math.min(maxHp(),hp+3);evt.descend=true;
        pushMsg("The "+cls.name.toLowerCase()+" descends to "+LEVELS[Math.min(depth,LEVELS.length-1)].toLowerCase()+"!");
        genLevel();updateHud();return 0;
      }
    }
  }
  return turnUpkeep();
}

function drawPortrait(c,cl){
  const x=c.getContext("2d"),w=c.width,h=c.height;
  x.fillStyle="#1a1a22";x.fillRect(0,0,w,h);
  x.fillStyle="#c89b6c";x.beginPath();x.arc(w/2,h*0.46,w*0.17,0,7);x.fill();
  x.fillStyle=cl.color;
  x.beginPath();x.moveTo(w*0.28,h*0.95);x.quadraticCurveTo(w/2,h*0.55,w*0.72,h*0.95);x.closePath();x.fill();
  if(cl.name==="Warrior"){
    x.fillStyle="#9aa0a8";x.beginPath();x.arc(w/2,h*0.42,w*0.19,Math.PI,0);x.fill();
    x.fillRect(w*0.31,h*0.42,w*0.38,h*0.06);
    x.strokeStyle="#D85A30";x.lineWidth=4;x.beginPath();x.moveTo(w/2,h*0.22);x.quadraticCurveTo(w*0.62,h*0.18,w*0.6,h*0.3);x.stroke();
  }else if(cl.name==="Ranger"){
    x.fillStyle="#4a6d1a";x.beginPath();x.moveTo(w*0.3,h*0.5);x.quadraticCurveTo(w/2,h*0.1,w*0.7,h*0.5);x.quadraticCurveTo(w/2,h*0.4,w*0.3,h*0.5);x.fill();
    x.strokeStyle="#b08d57";x.lineWidth=3;x.beginPath();x.arc(w*0.78,h*0.55,w*0.16,-1.2,1.2);x.stroke();
    x.beginPath();x.moveTo(w*0.78+w*0.16*Math.cos(-1.2),h*0.55+w*0.16*Math.sin(-1.2));x.lineTo(w*0.78+w*0.16*Math.cos(1.2),h*0.55+w*0.16*Math.sin(1.2));x.stroke();
  }else{
    x.fillStyle="#534AB7";x.beginPath();x.moveTo(w*0.3,h*0.36);x.lineTo(w/2,h*0.08);x.lineTo(w*0.7,h*0.36);x.closePath();x.fill();
    x.strokeStyle="#b08d57";x.lineWidth=3;x.beginPath();x.moveTo(w*0.24,h*0.9);x.lineTo(w*0.24,h*0.35);x.stroke();
    x.fillStyle="#EF9F27";x.beginPath();x.arc(w*0.24,h*0.3,4,0,7);x.fill();
  }
}

  document.getElementById("log").style.display="none";
  document.getElementById("invrow").style.display="none";
  document.getElementById("airow").style.display="none";
  document.getElementById("monrow").style.display="none";};
document.querySelectorAll("#pad [data-mv]").forEach(b=>{
  const mv=b.getAttribute("data-mv").split(",");
  b.onclick=()=>{if(ai.mode==="off")playerAct(parseInt(mv[0],10),parseInt(mv[1],10));};
});
document.getElementById("btn-ability").onclick=()=>{if(ai.mode==="off")ability();};
document.getElementById("btn-potion").onclick=()=>{if(ai.mode==="off")drinkPotion();};
document.getElementById("btn-wait").onclick=()=>{if(state==="play"&&ai.mode==="off")endTurn();};
document.getElementById("btn-map").onclick=()=>showMap=!showMap;
document.addEventListener("keydown",e=>{
  if(state!=="play"||ai.mode!=="off")return;
  const k=e.key.toLowerCase();
  const map={arrowup:[0,-1],w:[0,-1],arrowdown:[0,1],s:[0,1],arrowleft:[-1,0],a:[-1,0],arrowright:[1,0],d:[1,0]};
  if(map[k]){e.preventDefault();playerAct(map[k][0],map[k][1]);}
  else if(k===" "){e.preventDefault();endTurn();}
  else if(k==="f"){e.preventDefault();ability();}
  else if(k==="q"){e.preventDefault();drinkPotion();}
  else if(k==="e"){e.preventDefault();readScroll();}
  else if(k==="m"){showMap=!showMap;}
});
function draw(t){
  const w=cv.getBoundingClientRect().width,h=Math.round(w*TH/TW);
  if(w<10)return;
  if(cv.width!==Math.round(w*DPR)){cv.width=Math.round(w*DPR);cv.height=Math.round(h*DPR);cv.style.height=h+"px";}
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.fillStyle="#111118";ctx.fillRect(0,0,w,h);
  if(state==="select")return;
  const ts=w/TW,flick=0.85+0.15*Math.sin(t/120+Math.sin(t/77));
  for(let y=0;y<TH;y++)for(let x=0;x<TW;x++){
    const id=idx(x,y),vis=visCache.has(id),exp=explored[id];
    if(!vis&&!exp)continue;
    const g=grid[id],X=x*ts,Y=y*ts;
    if(g===WALL){
      ctx.fillStyle=vis?"#2e2e3c":"#1d1d28";ctx.fillRect(X,Y,ts,ts);
      ctx.fillStyle=vis?"#40405422":"#25253022";ctx.fillRect(X,Y,ts,2);
      ctx.strokeStyle=vis?"rgba(0,0,0,0.35)":"rgba(0,0,0,0.22)";ctx.lineWidth=1;
      ctx.beginPath();
      ctx.moveTo(X,Y+ts*0.5);ctx.lineTo(X+ts,Y+ts*0.5);
      const joff=((x+y)%2)?ts*0.33:ts*0.66;
      ctx.moveTo(X+joff,Y);ctx.lineTo(X+joff,Y+ts*0.5);
      ctx.moveTo(X+ts-joff,Y+ts*0.5);ctx.lineTo(X+ts-joff,Y+ts);
      ctx.stroke();
      ctx.fillStyle=vis?"rgba(255,255,255,0.05)":"rgba(255,255,255,0.02)";ctx.fillRect(X,Y,ts,1.5);
    }else{
      ctx.fillStyle=vis?"#3f3a4b":"#25222d";ctx.fillRect(X,Y,ts,ts);
      if((x*7+y*13)%5===0){ctx.fillStyle="rgba(255,255,255,0.04)";ctx.fillRect(X+ts*0.28,Y+ts*0.55,2,2);}
      if((x*11+y*3)%7===0){ctx.fillStyle="rgba(0,0,0,0.2)";ctx.fillRect(X+ts*0.6,Y+ts*0.22,2.5,2);}
      if(vis&&litSet.has(id)){ctx.fillStyle="rgba(240,160,60,"+(0.11*flick).toFixed(3)+")";ctx.fillRect(X,Y,ts,ts);}
      if(g===STAIRS){
        ctx.fillStyle="#0d0d12";ctx.fillRect(X+2,Y+2,ts-4,ts-4);
        ctx.strokeStyle=vis?"#a89e5a":"#5a5640";ctx.lineWidth=1.6;ctx.lineJoin="round";
        for(let s2=0;s2<3;s2++){
          const yy=Y+ts*(0.26+s2*0.2);
          ctx.beginPath();ctx.moveTo(X+ts*0.3,yy);ctx.lineTo(X+ts*0.5,yy+ts*0.12);ctx.lineTo(X+ts*0.7,yy);ctx.stroke();
        }
      }
      if(g===CHEST&&vis){
        ctx.fillStyle="#7a4e1c";ctx.fillRect(X+3,Y+ts*0.3,ts-6,ts*0.55);
        ctx.fillStyle="#9a6428";ctx.fillRect(X+3,Y+ts*0.3,ts-6,ts*0.2);
        ctx.fillStyle="#EF9F27";ctx.fillRect(X+3,Y+ts*0.52,ts-6,2);
        ctx.beginPath();ctx.arc(X+ts/2,Y+ts*0.58,2.2,0,7);ctx.fill();
      }
      if(g===CHESTO&&vis){
        ctx.fillStyle="#241608";ctx.fillRect(X+3,Y+ts*0.42,ts-6,ts*0.42);
        ctx.strokeStyle="#7a4e1c";ctx.lineWidth=1.5;ctx.strokeRect(X+3,Y+ts*0.42,ts-6,ts*0.42);
        ctx.strokeStyle="#9a6428";ctx.beginPath();ctx.moveTo(X+3,Y+ts*0.42);ctx.lineTo(X+ts/2,Y+ts*0.18);ctx.lineTo(X+ts-3,Y+ts*0.42);ctx.stroke();
      }
    }
  }
  for(const tc of torches){
    const id=idx(tc[0],tc[1]);
    if(!visCache.has(id)&&!explored[id])continue;
    const X=tc[0]*ts+ts/2,Y=tc[1]*ts+ts*0.3;
    ctx.fillStyle="#6b4a2a";ctx.fillRect(X-1,Y,2,ts*0.35);
    if(visCache.has(id)){ctx.fillStyle="rgba(255,"+(150+Math.floor(60*flick))+",50,0.95)";
      ctx.beginPath();ctx.arc(X,Y-1,2.5*flick+1,0,7);ctx.fill();}
  }
  for(const m of monsters){
    m.vx+=(m.x-m.vx)*0.4;m.vy+=(m.y-m.vy)*0.4;
    if(m.flash>0)m.flash-=0.1;
    if(!visCache.has(idx(m.x,m.y)))continue;
    const X=m.vx*ts+ts/2,Y=m.vy*ts+ts/2;
    if(m.flash>0){ctx.fillStyle="rgba(255,255,255,"+(m.flash*0.5).toFixed(2)+")";ctx.beginPath();ctx.arc(X,Y,ts*0.34,0,7);ctx.fill();}
    if(m.skel){
      ctx.strokeStyle="#e2e2ea";ctx.lineWidth=1.4;ctx.lineCap="round";
      ctx.beginPath();ctx.moveTo(X,Y-ts*0.02);ctx.lineTo(X,Y+ts*0.28);ctx.stroke();
      ctx.beginPath();ctx.moveTo(X-ts*0.14,Y+ts*0.06);ctx.lineTo(X+ts*0.14,Y+ts*0.06);ctx.stroke();
      ctx.beginPath();ctx.moveTo(X-ts*0.11,Y+ts*0.15);ctx.lineTo(X+ts*0.11,Y+ts*0.15);ctx.stroke();
      ctx.fillStyle="#e2e2ea";ctx.beginPath();ctx.arc(X,Y-ts*0.16,ts*0.15,0,7);ctx.fill();
      ctx.fillRect(X-ts*0.08,Y-ts*0.04,ts*0.16,ts*0.06);
      ctx.fillStyle="#16161c";ctx.fillRect(X-ts*0.09,Y-ts*0.2,2.6,2.6);ctx.fillRect(X+ts*0.035,Y-ts*0.2,2.6,2.6);
    }else{
      const fdir=px>=m.x?1:-1;
      ctx.strokeStyle="#8d8d96";ctx.lineWidth=1.3;ctx.lineCap="round";
      ctx.beginPath();ctx.moveTo(X-fdir*ts*0.24,Y+1);ctx.quadraticCurveTo(X-fdir*ts*0.42,Y+4,X-fdir*ts*0.46,Y-3);ctx.stroke();
      ctx.fillStyle="#8d8d96";
      ctx.beginPath();ctx.ellipse(X-fdir*ts*0.03,Y+2,ts*0.21,ts*0.14,0,0,7);ctx.fill();
      ctx.beginPath();ctx.arc(X+fdir*ts*0.19,Y-1,ts*0.11,0,7);ctx.fill();
      ctx.beginPath();ctx.arc(X+fdir*ts*0.13,Y-ts*0.13,ts*0.05,0,7);ctx.fill();
      ctx.fillStyle="#E24B4A";ctx.beginPath();ctx.arc(X+fdir*ts*0.22,Y-2,1.4,0,7);ctx.fill();
    }
    if(m.hp<m.maxhp){ctx.fillStyle="#333";ctx.fillRect(X-ts*0.25,Y-ts*0.42,ts*0.5,2.5);
      ctx.fillStyle="#E24B4A";ctx.fillRect(X-ts*0.25,Y-ts*0.42,ts*0.5*(m.hp/m.maxhp),2.5);}
    if(monAI.on){ctx.strokeStyle="rgba(226,75,74,0.55)";ctx.lineWidth=1;ctx.beginPath();ctx.arc(X,Y,ts*0.38,0,7);ctx.stroke();}
  }
  for(const s of shots){
    s.age+=0.12;
    if(s.age>1)continue;
    ctx.strokeStyle=s.c;ctx.globalAlpha=1-s.age;ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(s.x0*ts+ts/2,s.y0*ts+ts/2);ctx.lineTo(s.x1*ts+ts/2,s.y1*ts+ts/2);ctx.stroke();
    ctx.globalAlpha=1;
  }
  shots=shots.filter(s=>s.age<=1);
  vx+=(px-vx)*0.4;vy+=(py-vy)*0.4;
  const PX=vx*ts+ts/2,PY=vy*ts+ts/2;
  ctx.fillStyle="rgba(240,180,80,"+(0.06*flick).toFixed(3)+")";
  ctx.beginPath();ctx.arc(PX,PY,lightR()*ts,0,7);ctx.fill();
  ctx.fillStyle=cls.color;ctx.beginPath();ctx.arc(PX,PY,ts*0.32,0,7);ctx.fill();
  ctx.fillStyle="#f5e6d0";ctx.beginPath();ctx.arc(PX+fx*ts*0.16,PY+fy*ts*0.16,ts*0.1,0,7);ctx.fill();
  if(cls.name==="Warrior"){
    ctx.strokeStyle="#c8ccd4";ctx.lineWidth=2.2;
    ctx.beginPath();ctx.arc(PX,PY,ts*0.33,Math.PI*1.15,Math.PI*1.85);ctx.stroke();
  }else if(cls.name==="Ranger"){
    ctx.strokeStyle="#b08d57";ctx.lineWidth=1.6;
    ctx.beginPath();ctx.arc(PX-fx*ts*0.34,PY-fy*ts*0.34,ts*0.2,0,7);ctx.stroke();
  }else{
    ctx.fillStyle="#EF9F27";
    ctx.beginPath();ctx.moveTo(PX,PY-ts*0.5);ctx.lineTo(PX+3,PY-ts*0.36);ctx.lineTo(PX-3,PY-ts*0.36);ctx.closePath();ctx.fill();
  }
  if(ai.mode!=="off"){ctx.strokeStyle="#378ADD";ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(PX,PY,ts*0.45,0,7);ctx.stroke();}
  for(const f of floaters){
    f.age+=0.03;
    if(f.age>1)continue;
    ctx.fillStyle=f.c;ctx.globalAlpha=1-f.age;
    ctx.font="500 12px sans-serif";ctx.textAlign="center";
    ctx.fillText(f.txt,f.x*ts+ts/2,f.y*ts-f.age*14+ts*0.2);
    ctx.globalAlpha=1;
  }
  floaters=floaters.filter(f=>f.age<=1);
  if(showMap){
    const mw=TW*3,mh=TH*3,MX=w-mw-10,MY=10;
    ctx.fillStyle="rgba(10,10,16,0.85)";ctx.fillRect(MX-4,MY-4,mw+8,mh+8);
    for(let y=0;y<TH;y++)for(let x=0;x<TW;x++){
      const id=idx(x,y);
      if(!explored[id])continue;
      const g=grid[id];
      ctx.fillStyle=g===WALL?"#333":g===STAIRS?"#EF9F27":"#6a6a7a";
      ctx.fillRect(MX+x*3,MY+y*3,3,3);
    }
    ctx.fillStyle=cls.color;ctx.fillRect(MX+px*3-1,MY+py*3-1,5,5);
  }
}
const ncv=document.getElementById("netcv"),ntx=ncv.getContext("2d");
function drawNet(){
  if(!brainView||state!=="play")return;
  if(!ai.brain){aiEnsureBrain();}
  if(!lastActs||ai.mode==="off")lastActs=nfForwardAll(ai.brain,sensor().slice(0,brainIn(ai.brain)));
  const w=290,h=180;
  if(ncv.width!==Math.round(w*DPR)){ncv.width=Math.round(w*DPR);ncv.height=Math.round(h*DPR);}
  ntx.setTransform(DPR,0,0,DPR,0,0);ntx.clearRect(0,0,w,h);
  const cols=lastActs.length,P=[];
  for(let c=0;c<cols;c++){
    const n=lastActs[c].length,col=[];
    const x=c===cols-1?w-62:18+c*(w-92)/(cols-1);
    for(let i=0;i<n;i++)col.push([x,8+i*(h-16)/Math.max(1,n-1)]);
    P.push(col);
  }
  for(let li=0;li<ai.brain.length;li++){
    const W2=ai.brain[li].w,srcA=lastActs[li],A=P[li],B=P[li+1];
    for(let i=0;i<W2.length;i++)for(let j=0;j<W2[i].length;j++){
      const c=W2[i][j]*srcA[j],al=Math.min(0.7,Math.abs(c)*0.5);
      if(al<0.06)continue;
      ntx.strokeStyle=c>0?"#1D9E75":"#D85A30";ntx.globalAlpha=al;ntx.lineWidth=Math.min(1.8,0.3+Math.abs(c)*0.5);
      ntx.beginPath();ntx.moveTo(A[j][0],A[j][1]);ntx.lineTo(B[i][0],B[i][1]);ntx.stroke();
    }
  }
  ntx.globalAlpha=1;
  function node(x,y,r,a){
    const mag=Math.min(1,Math.abs(a));
    ntx.fillStyle=a>=0?"rgba(29,158,117,"+(0.15+0.85*mag).toFixed(2)+")":"rgba(216,90,48,"+(0.15+0.85*mag).toFixed(2)+")";
    ntx.beginPath();ntx.arc(x,y,r,0,7);ntx.fill();
    ntx.strokeStyle="rgba(160,160,175,0.6)";ntx.lineWidth=0.7;ntx.beginPath();ntx.arc(x,y,r,0,7);ntx.stroke();
  }
  for(let c=0;c<cols-1;c++)for(let i=0;i<lastActs[c].length;i++)node(P[c][i][0],P[c][i][1],c===0?3.2:2.8,lastActs[c][i]);
  const outA=lastActs[cols-1],omax=Math.max.apply(null,outA.map(Math.abs))||1;
  ntx.font="10.5px sans-serif";ntx.textBaseline="middle";ntx.textAlign="left";
  for(let i=0;i<outA.length;i++){
    node(P[cols-1][i][0],P[cols-1][i][1],5.5,outA[i]/omax);
    if(i===lastChosen){
      ntx.strokeStyle="#EF9F27";ntx.lineWidth=1.8;
      if(lastExplore)ntx.setLineDash([3,3]);
      ntx.beginPath();ntx.arc(P[cols-1][i][0],P[cols-1][i][1],8.5,0,7);ntx.stroke();ntx.setLineDash([]);
    }
    ntx.fillStyle="#c9c5d4";
    ntx.fillText(ALBL[i]||String(i),P[cols-1][i][0]+11,P[cols-1][i][1]);
  }
}
let lastT=performance.now(),acc=0;
function frame(t){
  const dt=Math.min(0.1,(t-lastT)/1000);lastT=t;
  if(state==="play"&&ai.mode!=="off"){
    acc+=dt*ai.sps;let guard=0;
    while(acc>=1&&guard<60){aiTick();acc-=1;guard++;}
  }
  draw(t);drawNet();
  requestAnimationFrame(frame);
}
applyTheme();
buildSelect();
requestAnimationFrame(frame);
setInterval(()=>{
  const stalled=performance.now()-lastT>400;
  if(stalled){
    if(state==="play"&&ai.mode!=="off"){for(let i=0;i<Math.max(1,Math.round(ai.sps/4));i++)aiTick();}
    draw(performance.now());drawNet();
  }
},250);
</script>
